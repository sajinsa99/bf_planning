<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning BF</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <button type="button" id="prev-month" aria-label="Mois précédent">&#8592;</button>
    <h1 id="month-title">&#8203;</h1>
    <button type="button" id="next-month" aria-label="Mois suivant">&#8594;</button>
    <select id="filter-select" aria-label="Filtrer par personne">
      <option value="all">Yann &amp; Bruno</option>
      <option value="Yann">Yann</option>
      <option value="Bruno">Bruno</option>
    </select>
    <button type="button" id="edit-toggle">Mode édition</button>
  </header>

  <div id="view-filters">
    <select id="month-select" aria-label="Mois"></select>
    <select id="day-select" aria-label="Jour"></select>
    <button type="button" id="reset-filters" hidden>↺ Réinitialiser</button>
  </div>

  <div id="edit-banner" hidden>
    &#9998; Mode édition — cliquez sur les créneaux pour les sélectionner
  </div>

  <div id="action-bar" hidden>
    <span id="selection-count"></span>
    <div class="action-buttons">
      <button type="button" id="apply-yann">Yann</button>
      <button type="button" id="apply-bruno">Bruno</button>
      <button type="button" id="apply-clear">Effacer</button>
      <button type="button" id="deselect-all">Désélectionner tout</button>
    </div>
  </div>

  <div id="calendar-header" class="calendar-grid">
    <div class="day-header">Lun</div>
    <div class="day-header">Mar</div>
    <div class="day-header">Mer</div>
    <div class="day-header">Jeu</div>
    <div class="day-header">Ven</div>
    <div class="day-header">Sam</div>
    <div class="day-header">Dim</div>
  </div>
  <div id="calendar" class="calendar-grid"></div>

  <dialog id="password-dialog">
    <form method="dialog">
      <h2>Mot de passe</h2>
      <input type="password" id="password-input" placeholder="Entrez le mot de passe" autocomplete="current-password">
      <div class="dialog-buttons">
        <button type="submit" id="password-submit">Valider</button>
        <button type="button" id="password-cancel">Annuler</button>
      </div>
      <p id="password-error" class="error" hidden>Mot de passe incorrect</p>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>

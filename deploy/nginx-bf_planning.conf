# This file adds a /planning/ location to the existing bfablet92.hd.free.fr vhost.
# Install: sudo cp this file to /etc/nginx/conf.d/bf_planning_location.conf
#          then add the following line inside the SSL server block of the bruno config:
#            include /etc/nginx/conf.d/bf_planning_location.conf;

location /planning/ {
    proxy_pass http://127.0.0.1:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# This file adds a /planning/ location to the existing bfablet92.hd.free.fr vhost.
# install.sh copies it to /etc/nginx/snippets/bf_planning_location.conf
# and injects: include /etc/nginx/snippets/bf_planning_location.conf;
# inside the SSL server block of /etc/nginx/sites-available/bruno

location /planning/ {
    proxy_pass http://127.0.0.1:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
